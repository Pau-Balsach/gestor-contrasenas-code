name: CI – Tests & Cobertura

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1 – Tests unitarios (sin red, sin Swing)
  # ──────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Java 25)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Crear config.properties de prueba
        run: |
          cat > config.properties <<'EOF'
          supabase.url=https://fake-supabase.example.com
          supabase.anon_key=eyJmYWtlIjoidHJ1ZSJ9
          riot.api_key=RGAPI-fake-key-for-tests
          henrik.api_key=HDEV-fake-key-for-tests
          EOF

      - name: Ejecutar tests unitarios
        run: |
          mvn test \
            -Djava.awt.headless=true \
            --no-transfer-progress \
            -Dsurefire.failIfNoSpecifiedTests=false
        env:
          SUPABASE_URL: https://fake-supabase.example.com
          SUPABASE_ANON_KEY: eyJmYWtlIjoidHJ1ZSJ9
          RIOT_API_KEY: RGAPI-fake-key-for-tests
          HENRIK_API_KEY: HDEV-fake-key-for-tests

      - name: Publicar resultados de tests (JUnit XML)
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          check_name: "Resultados JUnit"
          include_passed: true
          fail_on_failure: true

      - name: Subir informe de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Resumen de cobertura en el log
        if: always()
        run: |
          echo "## Cobertura JaCoCo" >> $GITHUB_STEP_SUMMARY
          if [ -f target/site/jacoco/index.html ]; then
            grep -oP 'Total[^%]+\d+%' target/site/jacoco/index.html | head -5 >> $GITHUB_STEP_SUMMARY || true
            echo "Ver artefacto 'jacoco-report' para el informe completo." >> $GITHUB_STEP_SUMMARY
          else
            echo "Informe JaCoCo no generado." >> $GITHUB_STEP_SUMMARY
          fi

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 – Análisis de seguridad (OWASP Dependency Check)
  # ──────────────────────────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30   # ← aumentado: con API key tarda ~5 min, sin ella puede necesitar más
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Crear config.properties mínima
        run: |
          cat > config.properties <<'EOF'
          supabase.url=https://fake.example.com
          supabase.anon_key=fake
          riot.api_key=fake
          henrik.api_key=fake
          EOF

      # Cachea la BD de NVD entre ejecuciones para no descargarla entera cada vez
      - name: Cache base de datos NVD
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-${{ runner.os }}-

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DassemblyAnalyzerEnabled=false \
            -Dnvd.api.key=${{ secrets.NVD_API_KEY }} \
            --no-transfer-progress || true

      - name: Subir informe OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report.html
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # JOB 3 – Build (verifica que el proyecto compila limpio)
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Compilación limpia
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Crear config.properties mínima
        run: |
          cat > config.properties <<'EOF'
          supabase.url=https://fake.example.com
          supabase.anon_key=fake
          riot.api_key=fake
          henrik.api_key=fake
          EOF

      - name: Compilar (sin tests)
        run: mvn compile --no-transfer-progress

      - name: Package
        run: mvn package -DskipTests --no-transfer-progress

      - name: Subir JAR
        uses: actions/upload-artifact@v4
        with:
          name: gestorcontrasenyas-jar
          path: target/*.jar
          retention-days: 7